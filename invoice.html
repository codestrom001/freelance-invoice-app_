<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Invoices | NovaInvoice</title>

  <link rel="stylesheet" href="css/style.css" />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />
</head>
<body>

  <!-- Background Glow -->
  <div class="bg-glow glow1"></div>
  <div class="bg-glow glow2"></div>

  <!-- Navbar -->
  <nav class="navbar">

    <div class="logo">
      <i class="fa-solid fa-bolt"></i>
      NovaInvoice
    </div>

    <ul class="nav-links">
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="client.html">Clients</a></li>
      <li><a class="active" href="invoice.html">Invoices</a></li>
    </ul>

    <button id="themeToggle">
      <i class="fa-solid fa-moon"></i>
    </button>

  </nav>

  <!-- Main -->
  <main class="container">

    <!-- Hero -->
    <section class="invoice-hero">

      <div>
        <h1>Invoice Manager</h1>

        <p>
          Create, manage and track your freelance invoices in cyberpunk style ⚡
        </p>
      </div>

      <div class="invoice-status-card">

        <h2 id="invoiceCount">0</h2>
        <span>Total Invoices</span>

      </div>

    </section>

    <!-- Invoice Form -->
    <section class="invoice-form-card">

      <div class="card-title">
        <i class="fa-solid fa-file-circle-plus"></i>
        <h2>Create Invoice</h2>
      </div>

      <form id="invoiceForm">

        <div class="input-grid">

          <!-- Client -->
          <div class="input-box">
            <label>Client</label>

            <select id="clientSelect" required>
              <option value="">Choose Client</option>
            </select>
          </div>

          <!-- Service -->
          <div class="input-box">
            <label>Service Title</label>

            <input
              type="text"
              id="serviceTitle"
              placeholder="Web Design"
              required
            />
          </div>

          <!-- Amount -->
          <div class="input-box">
            <label>Amount ($)</label>

            <input
              type="number"
              id="amount"
              placeholder="500"
              required
            />
          </div>

          <!-- Date -->
          <div class="input-box">
            <label>Date</label>

            <input
              type="date"
              id="invoiceDate"
              required
            />
          </div>

        </div>

        <!-- Description -->
        <div class="input-box textarea-box">

          <label>Description</label>

          <textarea
            id="description"
            rows="5"
            placeholder="Describe the service..."
          ></textarea>

        </div>

        <button type="submit" class="invoice-btn">
          <i class="fa-solid fa-plus"></i>
          Create Invoice
        </button>

      </form>

    </section>

    <!-- Invoice Stats -->
    <section class="invoice-stats-grid">

      <div class="mini-card">
        <h2 id="paidCount">0</h2>
        <p>Paid</p>
      </div>

      <div class="mini-card">
        <h2 id="unpaidCount">0</h2>
        <p>Unpaid</p>
      </div>

      <div class="mini-card">
        <h2 id="totalMoney">$0</h2>
        <p>Total Revenue</p>
      </div>

    </section>

    <!-- Invoice Table -->
    <section class="invoice-table-card">

      <div class="table-header">

        <div class="card-title">
          <i class="fa-solid fa-receipt"></i>
          <h2>Invoices List</h2>
        </div>

        <input
          type="text"
          id="searchInvoice"
          placeholder="Search invoice..."
        />

      </div>

      <div class="table-wrapper">

        <table>

          <thead>
            <tr>
              <th>Client</th>
              <th>Service</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="invoiceTableBody">

            <!-- JS DATA -->

          </tbody>

        </table>

      </div>

    </section>

  </main>

  <script src="js/main.js"></script>
  <script src="js/invoices.js"></script>

</body>
</html>
